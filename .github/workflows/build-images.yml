name: Build and Push Images
on:
  push:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:

jobs:
  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mad-api:latest
            ghcr.io/${{ github.repository_owner }}/mad-api:${{ github.sha }}

  build-worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mad-worker:latest
            ghcr.io/${{ github.repository_owner }}/mad-worker:${{ github.sha }}

  deploy-modal:
    needs: [build-worker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen --no-dev
        working-directory: backend
      - run: uv run python -m modal deploy -m worker.modal_worker
        working-directory: backend
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
